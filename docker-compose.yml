services:
  cdt-monitor:
    # 使用 GitHub Container Registry 构建的镜像
    # 如需本地构建，取消注释下面一行并注释 image 行
    # build: .
    image: ghcr.io/seameee/cdt-monitor:latest
    container_name: cdt-monitor
    restart: always
    ports:
      - "127.0.0.1:43210:80"  # 仅绑定本地接口，避免直接暴露到公网
    volumes:
      # 持久化数据目录，确保重启/升级后配置和数据库不丢失
      - ./data:/var/www/html/data
      # 可选：如果你想查看 Docker 内部的日志
      # - ./logs:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai  # 设置时区，对 Cron 任务很重要